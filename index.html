<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎁</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#cfefff,#a8e6ff,#dff6ff);
overflow:hidden;
color:#1b3a57;
text-align:center;
}
.gift-wrapper{
perspective:800px;
}
.gift{
width:160px;
height:160px;
background:#8fd8ff;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}
.ribbonV{
position:absolute;
width:30px;
height:100%;
background:white;
left:65px;
}
.ribbonH{
position:absolute;
height:30px;
width:100%;
background:white;
top:65px;
}
.lid{
position:absolute;
width:170px;
height:40px;
background:#5cc9ff;
top:-35px;
left:-5px;
border-radius:8px;
transition:1s;
}
.gift:hover{
transform:rotateY(15deg) rotateX(10deg) scale(1.05);
}
.surprise{
display:none;
animation:pop 1.5s forwards;
}
@keyframes pop{
from{opacity:0;transform:scale(.5);}
to{opacity:1;transform:scale(1);}
}
.cake{
font-size:80px;
margin-top:10px;
}
.candles{
font-size:30px;
margin-top:-20px;
}
.title{
font-size:32px;
color:#2a6f97;
}
.text{
max-width:300px;
margin:auto;
margin-bottom:20px;
}
.photo-gallery{
margin-top:10px;
width:260px;
height:260px;
position:relative;
margin-left:auto;
margin-right:auto;
display:flex;
justify-content:center;
align-items:center;
}
.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
opacity:0;
transform:scale(.9);
transition:all 1.5s ease;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}
.slide.active{
opacity:1;
transform:scale(1);
}
.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}
.balloon{
position:absolute;
font-size:30px;
animation:rise 10s linear infinite;
}
@keyframes rise{
from{transform:translateY(100vh)}
to{transform:translateY(-120vh)}
}
.heart{
position:absolute;
font-size:18px;
animation:heartFloat 6s linear infinite;
}
@keyframes heartFloat{
from{transform:translateY(100vh);opacity:1}
to{transform:translateY(-120vh);opacity:0}
}
.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}
@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(18);opacity:0}
}
@media(max-width:600px){
.gift{width:130px;height:130px;}
.title{font-size:26px;}
.photo-gallery{width:220px;height:220px;}
}
</style>
</head>
<body>
<div>
<div class="gift-wrapper">
<div class="gift" onclick="openGift()">
<div class="lid" id="lid"></div>
<div class="ribbonV"></div>
<div class="ribbonH"></div>
</div>
</div>

<div class="surprise" id="surprise">
<div class="cake">🎂</div>
<div class="candles flame">🕯️ 🕯️ 🕯️</div>
<h1 class="title">Happy Birthday 💙</h1>
<p class="text">
Wishing you happiness, success, and endless smiles today!<br>
Blow into the microphone to blow the candles 💨
</p>

<div class="photo-gallery">
<img src="b.jpg" class="slide active">
<img src="h.jpg" class="slide">
<img src="d.jpg" class="slide">
<img src="r.jpg" class="slide">
</div>
</div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-smile.mp3"></audio>

<script>
function openGift(){
document.getElementById("lid").style.transform="translateY(-120px) rotate(-15deg)";
setTimeout(()=>{
document.querySelector(".gift-wrapper").style.display="none";
document.getElementById("surprise").style.display="block";
startConfetti();
startFireworks();
document.getElementById("music").play();
startMic();
},900);
}

let slides=document.querySelectorAll(".slide");
let index=0;
function showSlides(){
slides.forEach(s=>s.classList.remove("active"));
index++;
if(index>=slides.length){index=0;}
slides[index].classList.add("active");
}
setInterval(showSlides,3000);

function startConfetti(){
for(let i=0;i<120;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
}
}

setInterval(()=>{
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"vw";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},900);

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},700);

function startFireworks(){
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
f.style.background=`hsl(${Math.random()*360},100%,60%)`;
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
},600);
}

function startMic(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
const audioContext=new AudioContext();
const mic=audioContext.createMediaStreamSource(stream);
const analyser=audioContext.createAnalyser();
mic.connect(analyser);
const data=new Uint8Array(analyser.frequencyBinCount);
function detectBlow(){
analyser.getByteFrequencyData(data);
let volume=data.reduce((a,b)=>a+b)/data.length;
if(volume>60){
document.querySelector(".flame").textContent="🕯️ 🕯️ 🕯️";
}
requestAnimationFrame(detectBlow);
}
detectBlow();
});
}
</script>
</body>
</html>
